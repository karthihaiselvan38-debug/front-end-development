<!DOCTYPE html>
<html>
<head>
    <title>Responsive Webpage</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        /* Header */
        header {
            background-color: blue;
            color: white;
            text-align: center;
            padding: 20px;
        }

        /* Navigation */
        nav {
            background-color: lightgray;
            text-align: center;
            padding: 10px;
        }

        nav a {
            text-decoration: none;
            margin: 10px;
            color: black;
            font-size: 18px;
        }

        /* Main Content */
        .container {
            display: flex;
            padding: 20px;
        }

        .box {
            flex: 1;
            background: lightblue;
            margin: 10px;
            padding: 20px;
            text-align: center;
        }

        /* Responsive Design */
        @media screen and (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            nav a {
                display: block;
                margin: 10px 0;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>My Responsive Website</h1>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <div class="container">
        <div class="box">
            <h2>Section 1</h2>
            <p>Welcome to responsive web design.</p>
        </div>

        <div class="box">
            <h2>Section 2</h2>
            <p>This page adjusts to screen size.</p>
        </div>
    </div>

</body>
</html>
