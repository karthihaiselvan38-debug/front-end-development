<!DOCTYPE html>
<html>
<head>
<title>Calculator</title>
<style>
    body{
        text-align: center;
        margin:auto;
        padding: 20px;
    }
    
</style>
<script>
function calc(op){
 let a=+n1.value, b=+n2.value;
 if(op=='+') r.innerHTML=a+b;
 if(op=='-') r.innerHTML=a-b;
 if(op=='*') r.innerHTML=a*b;
 if(op=='/') r.innerHTML=a/b;
}
</script>
</head>
<body>
<h1>simple Calculator</h1>
<input id="n1" placeholder="Num1">
<input id="n2" placeholder="Num2"><br><br> 

<button onclick="calc('+')">+</button>
<button onclick="calc('-')">-</button>
<button onclick="calc('*')">*</button>
<button onclick="calc('/')">/</button>

<h3 id="r"></h3>

</body>
</html>
