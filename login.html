<!DOCTYPE html>
<html>
    <head>
        <title>login page</title>

    <style>
      .form{
    width:250px;
    height: 380px;
    background:linear-gradient(to top, rgba(165, 165, 169, 0.8)50%,rgba(204, 114, 114, 0.8)50%);
    position: absolute;
    top: 20px;
      left:600px;
  
    border-radius: 10px;
    padding: 25px;


}
.form h2{
    width: 220px;
    font-family: sans-serif;
    text-align: center;
    color:#ff7200;
    font-size: 22px;
    background-color: #ffffff;
    border-radius: 10px;
    margin:8px;

}
.form input{
    width:240px;
    height: 35px;
    background: transparent;
    border-bottom: 1px solid #fef9f9;
    border-top: none;
    border-right: none;
    border-left: none;
    color:#fff;
    font-size: 15px;
    letter-spacing: 1px;
    margin-top: 30px;
    font-family: sans-serif;
}

.form input:focus{
    outline:none;
}
::placeholder{
    color:#fff;
    font-family: Arial;
}
.btn{
    width: 240px;
    height: 40px;
    background: #ff7200;
    border: none;
    margin-top: 30px;
    font-size: 18px;
    border-radius: 10px;
    cursor:pointer;
    color:#fff;
    transition: 0.4s ease;

}
.btn:hover{
    background: #efeded;
    color: #ff7200;
}
.btn a{
    text-decoration: none;
    color: #000;
    font-weight: bold;
}
.form .link{
    font-family: Arial, Helvetica, sans-serif;
    font-size: 17px;

    text-align: center;
}
.form.link a{

.liw{

    text-align: center;
}
    </style>
