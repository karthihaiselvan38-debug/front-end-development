<!DOCTYPE html>
<html>
<head>
<title>Digital Clock</title>
<style>
    body{
        font-family: "times new roman";
        background-color: #3fc8c80d;
        display:flex;
        justify-content: center;
        align-items: center;
        height:110vh;
        color: rgb(219, 21, 21);
        

        }
    h2
    {
        font-size: larger;
        padding: 20px;
    }
</style>
<script>
function clock(){
 let d=new Date();
 t.innerHTML=d.toLocaleTimeString();
}
setInterval(clock,1000);
</script>
</head>
<body>
<h1>digital clock</h1><br><br>
<h2 id="t"></h2>

</body>
</html>
