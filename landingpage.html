<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Landing Page</title>
</head>
<style>
    *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

/* Navbar */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
background:#111;
color:white;
padding:15px 50px;
}

.menu{
display:flex;
list-style:none;
gap:20px;
}

/* Hero Section */

.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
url("https://picsum.photos/1600/900");
background-size:cover;
color:white;
}

.hero h1{
font-size:50px;
}

.hero p{
margin:20px 0;
font-size:18px;
}

.hero button{
padding:12px 25px;
border:none;
background:orange;
color:white;
font-size:16px;
cursor:pointer;
border-radius:5px;
}

/* Features */

.features{
display:flex;
justify-content:center;
gap:30px;
padding:60px;
background:#f4f4f4;
}

.box{
background:white;
padding:30px;
width:200px;
text-align:center;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* Footer */

footer{
text-align:center;
padding:20px;
background:#111;
color:white;
}
</style>

<body>

<!-- Navbar -->
<header>
    <nav class="navbar">
        <h2 class="logo">MySite</h2>
        <ul class="menu">
            <li>Home</li>
            <li>Features</li>
            <li>Contact</li>
        </ul>
    </nav>
</header>

<!-- Hero Section -->
<section class="hero">
    <h1>Build Your Future</h1>
    <p>Learn web development and create amazing websites.</p>
    <button>Get Started</button>
</section>

<!-- Features -->
<section class="features">
    <div class="box">
        <h3>Fast Learning</h3>
        <p>Easy tutorials for beginners.</p>
    </div>

    <div class="box">
        <h3>Projects</h3>
        <p>Practice with real examples.</p>
    </div>

    <div class="box">
        <h3>Support</h3>
        <p>Guidance for every step.</p>
    </div>
</section>

<!-- Footer -->
<footer>
    <p>© 2026 MySite | All Rights Reserved</p>
</footer>

</body>
</html>
