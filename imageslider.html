<!DOCTYPE html>
<html>
<head>
    <title>Simple Image Slider</title>

    <style>
        body{
            text-align:center;
            font-family:Arial;
            margin-top:50px;
        }

        img{
            width:500px;
            height:300px;
            border-radius:10px;
        }

        button{
            padding:10px 20px;
            margin:20px;
            font-size:18px;
            cursor:pointer;
        }
    </style>
</head>

<body>

    <h1>Simple Image Slider</h1>

    <img id="slider" 
    src="https://picsum.photos/id/1015/500/300">

    <br>

    <button onclick="previousImage()">Previous</button>
    <button onclick="nextImage()">Next</button>

    <script>

        let images = [
            "https://picsum.photos/id/1015/500/300",
            "https://picsum.photos/id/1025/500/300",
            "https://picsum.photos/id/1035/500/300"
        ];

        let index = 0;

        function nextImage()
        {
            index++;

            if(index >= images.length)
            {
                index = 0;
            }

            document.getElementById("slider").src = images[index];
        }

        function previousImage()
        {
            index--;

            if(index < 0)
            {
                index = images.length - 1;
            }

            document.getElementById("slider").src = images[index];
        }

    </script>

</body>
</html>
